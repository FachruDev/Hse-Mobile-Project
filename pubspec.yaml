name: hse_mobile
description: "HSE Mobile Apps"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.1.1
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_hooks: ^0.21.3+1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.3.1
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  hive_flutter: ^1.1.0
  hooks: ^2.0.2
  hooks_riverpod: ^3.3.1
  image_picker: ^1.2.2
  intl: ^0.20.2
  json_annotation: ^4.11.0
  mocktail: ^1.0.5
  pdf: ^3.12.0
  permission_handler: ^12.0.3
  printing: ^5.14.3
  reactive_forms: ^18.2.2
  riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  riverpod_generator: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/fonts/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/icons/logo.png
  adaptive_icon_background: "#0A57A4"
  adaptive_icon_foreground: assets/icons/logo.png
  web:
    generate: true
    image_path: assets/icons/logo.png
    background_color: "#0A57A4"
    theme_color: "#0A57A4"
  windows:
    generate: true
    image_path: assets/icons/logo.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/icons/logo.png

flutter_native_splash:
  color: "#0A57A4"
  image: assets/icons/logo.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#0A57A4"
    image: assets/icons/logo.png
