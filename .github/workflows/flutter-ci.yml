name: Flutter CI

on:
  push:
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare environment
        run: cp .env.example .env

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
